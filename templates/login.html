{% extends "base.html" %}

{% block title %}Iniciar Sesión - SIGE{% endblock %}

{% block public_content %}
<div class="login-container">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div class="mb-3">
                                <i class="bi bi-building text-primary" style="font-size: 4rem;"></i>
                            </div>
                            <h2 class="fw-bold mb-1">SIGE</h2>
                            <p class="text-muted">Sistema Integral de Gestión Escolar</p>
                        </div>
                        
                        <form method="POST" action="{{ url_for('auth.login') }}">
                            <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
                            
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">
                                    <i class="bi bi-person"></i> Usuario o Correo
                                </label>
                                <input type="text" 
                                       class="form-control form-control-lg" 
                                       id="username" 
                                       name="username" 
                                       required 
                                       autofocus 
                                       placeholder="Ingrese su usuario">
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">
                                    <i class="bi bi-lock"></i> Contraseña
                                </label>
                                <input type="password" 
                                       class="form-control form-control-lg" 
                                       id="password" 
                                       name="password" 
                                       required 
                                       placeholder="Ingrese su contraseña">
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                <label class="form-check-label" for="remember">
                                    Recordarme
                                </label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <small class="text-muted">
                        <i class="bi bi-info-circle"></i> ¿Problemas para acceder? Contacte al administrador
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
    }
    
    .login-container {
        position: relative;
        z-index: 1;
    }
    
    .card {
        border-radius: 1rem;
        backdrop-filter: blur(10px);
    }
    
    .form-control {
        border-radius: 0.5rem;
    }
    
    .btn-primary {
        border-radius: 0.5rem;
        padding: 0.75rem;
        font-weight: 600;
    }
    
    .form-label {
        margin-bottom: 0.5rem;
    }
</style>
{% endblock %}
