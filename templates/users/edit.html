{% extends "base.html" %}

{% block title %}Editar Usuario - {{ user.username }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Editar Usuario: {{ user.username }}</h1>
            <a href="{{ url_for('users.users_list') }}" class="text-gray-600 hover:text-gray-800">← Volver</a>
        </div>

        <!-- Reuse create form -->
        {% include 'users/create.html' %}
    </div>
</div>
{% endblock %}
