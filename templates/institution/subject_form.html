{% extends "base.html" %}

{% block title %}{{ 'Editar' if subject else 'Nueva' }} Asignatura - SIGE{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">
        <i class="bi bi-book"></i> {{ 'Editar' if subject else 'Nueva' }} Asignatura
    </h2>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Nombre de la Asignatura *</label>
                        <input type="text" name="name" class="form-control"
                               value="{{ subject.name if subject else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Código</label>
                        <input type="text" name="code" class="form-control"
                               value="{{ subject.code if subject else '' }}">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> {{ 'Actualizar' if subject else 'Crear' }} Asignatura
                </button>
                <a href="{{ url_for('institution.subjects') }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Cancelar
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
