{% extends "base.html" %}

{% block title %}{{ 'Editar' if period else 'Nuevo' }} Periodo Académico - SIGE{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">
        <i class="bi bi-calendar3"></i> {{ 'Editar' if period else 'Nuevo' }} Periodo Académico
    </h2>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Nombre del Periodo *</label>
                        <input type="text" name="name" class="form-control"
                               value="{{ period.name if period else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Nombre Corto *</label>
                        <input type="text" name="short_name" class="form-control"
                               value="{{ period.short_name if period else '' }}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Fecha de Inicio *</label>
                        <input type="date" name="start_date" class="form-control"
                               value="{{ period.start_date.strftime('%Y-%m-%d') if period else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Fecha de Fin *</label>
                        <input type="date" name="end_date" class="form-control"
                               value="{{ period.end_date.strftime('%Y-%m-%d') if period else '' }}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Año Académico *</label>
                        <input type="text" name="academic_year" class="form-control"
                               value="{{ period.academic_year if period else '2026' }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Orden *</label>
                        <input type="number" name="order" class="form-control" min="1"
                               value="{{ period.order if period else 1 }}" required>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check mt-4">
                            <input type="checkbox" name="is_active" class="form-check-input" id="is_active"
                                   {% if not period or period.is_active %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">Periodo Activo</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> {{ 'Actualizar' if period else 'Crear' }} Periodo
                </button>
                <a href="{{ url_for('institution.periods') }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Cancelar
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
