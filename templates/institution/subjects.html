{% extends "base.html" %}

{% block title %}Asignaturas - SIGE{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-book"></i> Asignaturas</h2>
        <a href="{{ url_for('institution.subject_new') }}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nueva Asignatura
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover datatable">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for subject in subjects %}
                        <tr>
                            <td>{{ subject.code }}</td>
                            <td>{{ subject.name }}</td>
                            <td>
                                <a href="{{ url_for('institution.subject_edit', id=subject.id) }}" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form method="POST" action="{{ url_for('institution.subject_delete', id=subject.id) }}" style="display:inline" onsubmit="return confirm('¿Eliminar asignatura {{ subject.name }}?')">
                                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                    <button type="submit" class="btn btn-sm btn-danger" title="Eliminar">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
